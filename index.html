<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleuth Kit Forensic Investigation — IT 322 · Bryan Treanton</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0c0f;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;font-family:'Courier New',Courier,monospace;}
.wrap{width:100%;max-width:760px;}
.chrome{background:#21262d;padding:10px 16px;display:flex;align-items:center;gap:8px;border-radius:12px 12px 0 0;border-bottom:1px solid #30363d;}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;}
.title-bar{font-size:12px;color:#8b949e;margin-left:auto;}
.slide{background:#0d1117;padding:32px 36px;min-height:420px;}
.nav{background:#161b22;padding:12px 20px;display:flex;align-items:center;gap:10px;border-radius:0 0 12px 12px;border-top:1px solid #30363d;}
.prog{flex:1;display:flex;gap:4px;align-items:center;}
.prog-bar{height:3px;flex:1;border-radius:2px;transition:background 0.25s;}
button{font-family:'Courier New',Courier,monospace;font-size:12px;padding:6px 16px;border-radius:6px;cursor:pointer;}
#btn-prev{background:transparent;border:1px solid #30363d;color:#8b949e;}
#btn-next{background:#238636;border:none;color:#fff;}
#btn-prev:hover{border-color:#58a6ff;color:#58a6ff;}
#btn-next:hover{opacity:0.85;}
pre{font-family:'Courier New',Courier,monospace;white-space:pre;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s step-end infinite;}
</style>
</head>
<body>
<div class="wrap">
  <div class="chrome">
    <span class="dot" style="background:#ff5f57;"></span>
    <span class="dot" style="background:#ffbd2e;"></span>
    <span class="dot" style="background:#28c840;"></span>
    <span class="title-bar" id="slide-label">TSK_FORENSICS.ps1 — 1 / 10</span>
  </div>
  <div class="slide" id="slide-content"></div>
  <div class="nav">
    <button id="btn-prev" onclick="navigate(-1)">◀ PREV</button>
    <div class="prog" id="prog"></div>
    <button id="btn-next" onclick="navigate(1)">NEXT ▶</button>
  </div>
</div>

<script>
const G='#3fb950',B='#58a6ff',A='#d29922',R='#f85149',D='#8b949e',T='#e6edf3',S='#c9d1d9',BG='#161b22',BG2='#0d1117',BD='#30363d';

const card=(label,val,c)=>`<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:${D};">${label}</span><span style="font-size:13px;font-weight:600;color:${c};">${val}</span></div>`;
const hdr=(n,title,c)=>`<div style="border-left:3px solid ${c};padding-left:16px;margin-bottom:16px;"><div style="font-size:11px;color:${c};letter-spacing:2px;margin-bottom:4px;">${n}</div><div style="font-size:20px;color:${T};font-weight:600;">${title}</div></div>`;
const cmd=(c)=>`<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:12px 16px;font-size:12px;color:${S};margin-bottom:12px;"><span style="color:${G};">PS&gt;</span> ${c}</div>`;
const out=(content)=>`<div style="background:${BG2};border:1px solid ${BD};border-radius:6px;padding:14px 16px;font-size:11px;line-height:1.9;overflow-x:auto;margin-bottom:12px;">${content}</div>`;

const slides=[
{r:()=>`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;text-align:center;gap:12px;">
<div style="font-size:11px;color:${G};letter-spacing:3px;">IT 322 · DIGITAL FORENSICS</div>
<div style="font-size:11px;color:#30363d;">┌──────────────────────────────────────────────┐</div>
<div style="font-size:28px;font-weight:700;color:${T};line-height:1.2;padding:0 16px;">SLEUTH KIT<br><span style="color:${G};">FORENSIC INVESTIGATION</span></div>
<div style="font-size:11px;color:#30363d;">└──────────────────────────────────────────────┘</div>
<div style="margin-top:12px;display:flex;flex-direction:column;gap:6px;align-items:center;">
<div style="font-size:13px;color:${D};"><span style="color:${B};">student://</span> Bryan Treanton</div>
<div style="font-size:13px;color:${D};"><span style="color:${B};">evidence://</span> Metasploitable.vmdk</div>
<div style="font-size:13px;color:${D};"><span style="color:${B};">toolkit://</span> The Sleuth Kit 4.12.1</div>
<div style="font-size:13px;color:${D};"><span style="color:${B};">fs_type://</span> Ext3 Linux Filesystem</div>
</div>
<div style="margin-top:20px;font-size:11px;color:#484f58;" class="blink">▊ press NEXT or use arrow keys to begin</div>
</div>`},

{r:()=>`${hdr('MISSION BRIEF','Lab Objective',G)}
<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:18px;color:${S};font-size:13px;line-height:1.8;margin-bottom:14px;">Use Sleuth Kit command-line tools to conduct a full forensic examination of a virtual disk image — from partition structure identification through filesystem traversal, orphan artifact investigation, and file recovery attempt.</div>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
${['Partition Analysis','Filesystem Identification','File Enumeration','Orphan Investigation','Metadata Recovery','File Recovery Attempt'].map((it,i)=>`<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:10px;"><span style="color:${G};font-size:12px;">[${String(i+1).padStart(2,'0')}]</span><span style="color:${S};font-size:13px;">${it}</span></div>`).join('')}
</div>`},

{r:()=>`${hdr('STEPS 01 – 06','Environment Setup',B)}
${cmd('mkdir E:\\\\Tools; mkdir E:\\\\Evidence; mkdir E:\\\\Cases')}
${cmd('Invoke-WebRequest -Uri "https://github.com/sleuthkit/...4.12.1-win32.zip" -OutFile "E:\\\\Tools\\\\sleuthkit.zip"')}
${cmd('Expand-Archive -Path "E:\\\\Tools\\\\sleuthkit.zip" -DestinationPath "E:\\\\Tools\\\\sleuthkit"')}
<div style="background:${BG2};border:1px solid ${BD};border-left:2px solid #238636;border-radius:6px;padding:12px 16px;font-size:12px;color:${D};margin-bottom:10px;">
<span style="color:${G};">✓</span> mmls.exe &nbsp;<span style="color:${G};">✓</span> fsstat.exe &nbsp;<span style="color:${G};">✓</span> fls.exe &nbsp;<span style="color:${G};">✓</span> istat.exe &nbsp;<span style="color:${G};">✓</span> icat.exe &nbsp;<span style="color:${G};">✓</span> tsk_recover.exe
</div>
<div style="font-size:12px;color:${D};">All executables confirmed in <span style="color:${B};">E:\\Tools\\sleuthkit\\sleuthkit-4.12.1-win32\\bin</span></div>`},

{r:()=>`${hdr('STEP 07','Evidence Image Identified',A)}
${cmd('Test-Path "C:\\\\Users\\\\Administrator\\\\Desktop\\\\Metasploitable.vmdk"')}
<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:12px 16px;font-size:12px;color:${G};margin-bottom:12px;">True</div>
${out(`<pre style="color:${S};">Mode          LastWriteTime         Length  Name\n----          -------------         ------  ----\n-a----  5/1/2026  1:27 PM   1925644288  <span style="color:#f0883e;">Metasploitable.vmdk</span></pre>`)}
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:12px;text-align:center;"><div style="font-size:11px;color:${D};margin-bottom:4px;">FILE SIZE</div><div style="font-size:18px;color:#f0883e;font-weight:600;">~1.9 GB</div></div>
<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:12px;text-align:center;"><div style="font-size:11px;color:${D};margin-bottom:4px;">FORMAT</div><div style="font-size:18px;color:${B};font-weight:600;">.vmdk</div></div>
<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:12px;text-align:center;"><div style="font-size:11px;color:${D};margin-bottom:4px;">STATUS</div><div style="font-size:18px;color:${G};font-weight:600;">VALID</div></div>
</div>`},

{r:()=>`${hdr('STEP 08 · mmls','Partition Analysis',G)}
${cmd('.\\\\mmls.exe "C:\\\\Users\\\\Administrator\\\\Desktop\\\\Metasploitable.vmdk"')}
${out(`<pre style="color:${D};">DOS Partition Table  ·  Units: 512-byte sectors\n\nSlot   Start        End          Length       Description\n000    Meta         0000000000   0000000001   Primary Table (#0)\n001    -------      0000000000   0000000062   Unallocated\n<span style="color:${G};font-weight:bold;">002    000:000      0000000063   0000481887   Linux (0x83)  &lt;-- TARGET</span>\n003    Meta         0000481950   0016289910   DOS Extended (0x05)\n004    Meta         0000481950   0000000001   Extended Table (#1)\n005    -------      0000481950   0000000063   Unallocated\n<span style="color:${B};">006    001:000      0000482013   0016289847   Linux LVM (0x8e)</span>\n007    -------      0016771860   0000005356   Unallocated</pre>`)}
<div style="background:#0d1320;border:1px solid #1f3a5e;border-radius:6px;padding:12px 16px;font-size:12px;color:${D};display:flex;gap:24px;flex-wrap:wrap;">
<div><span style="color:${A};">▶</span> Linux offset: <span style="color:${G};">63</span></div>
<div><span style="color:${A};">▶</span> LVM offset: <span style="color:${B};">482013</span></div>
<div><span style="color:${A};">▶</span> Selected: <span style="color:${G};">offset 63</span></div>
</div>`},

{r:()=>`${hdr('STEP 09 · fsstat','Filesystem Analysis',B)}
${cmd('.\\\\fsstat.exe -o 63 "C:\\\\Users\\\\Administrator\\\\Desktop\\\\Metasploitable.vmdk"')}
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;">
${[['FS TYPE','Ext3',G],['SOURCE OS','Linux',G],['BLOCK SIZE','1024 bytes',B],['INODE RANGE','1 – 60241',B],['BLOCK RANGE','0 – 240939',D],['ROOT INODE','2',A]].map(([l,v,c])=>card(l,v,c)).join('')}
</div>
<div style="background:${BG};border:1px solid ${BD};border-radius:6px;padding:10px 14px;font-size:12px;color:${D};">
<span style="color:${A};">LAST WRITTEN:</span> 2012-05-20 12:56:57 &nbsp;·&nbsp; <span style="color:${A};">LAST MOUNTED:</span> 2012-05-20 12:46:48 &nbsp;·&nbsp; <span style="color:${A};">UNMOUNTED:</span> <span style="color:${G};">Properly</span>
</div>`},

{r:()=>`${hdr('STEPS 10 – 11 · fls','File Enumeration','#f0883e')}
${cmd('.\\\\fls.exe -r -o 63 "C:\\\\Users\\\\...\\\\Metasploitable.vmdk"')}
${out(`<pre style="color:${D};">d/d  56225      lost+found\n<span style="color:${R};">d/r *50201      boot  (realloc)</span>\nr/r  50202      abi-2.6.24-16-server\nr/r  50203      config-2.6.24-16-server\nd/d  50204      <span style="color:${B};">grub/</span>\n  + r/r 50205   menu.lst\n  + r/r 50215   stage1\n  + r/r 50213   stage2\n  + <span style="color:${R};">r/r *50222     menu.lst~ (deleted)</span>\nr/r  50221      vmlinuz-2.6.24-16-server\nV/V  60241      <span style="color:${A};">\$OrphanFiles</span>\n  + <span style="color:${A};">-/r *50211     OrphanFile-50211</span>\n  + <span style="color:${A};">-/r *50217     OrphanFile-50217</span>\n  + <span style="color:${A};">-/r *50218     OrphanFile-50218</span></pre>`)}
<div style="display:flex;gap:10px;font-size:12px;flex-wrap:wrap;">
<div style="background:${BG};border:1px solid ${A};border-radius:6px;padding:8px 12px;color:${A};">⚠ 3 orphaned inodes detected</div>
<div style="background:${BG};border:1px solid ${R};border-radius:6px;padding:8px 12px;color:${R};">2 deleted files flagged (*)</div>
</div>`},

{r:()=>`${hdr('STEP 12 · istat','Orphaned Inode Metadata',A)}
${cmd('.\\\\istat.exe -o 63 "C:\\\\Users\\\\...\\\\Metasploitable.vmdk" 50211')}
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;">
${[['INODE','50211',A],['STATUS','Not Allocated',R],['UID / GID','0 / 0 (root)',B],['FILE SIZE','0 bytes',D]].map(([l,v,c])=>card(l,v,c)).join('')}
</div>
${out(`<pre style="color:${D};">Accessed:       <span style="color:${A};">2010-04-28 13:54:28</span>\nFile Modified:  <span style="color:${A};">2010-04-28 13:58:28</span>\nInode Modified: <span style="color:${A};">2010-04-28 13:58:28</span>\nDeleted:        <span style="color:${R};">2010-04-28 13:58:28</span></pre>`)}
<div style="font-size:12px;color:${D};font-style:italic;">Metadata survives deletion — timestamps, permissions, and ownership remain forensically recoverable even without file content.</div>`},

{r:()=>`${hdr('STEP 13 · icat','File Recovery Attempt',R)}
${cmd('.\\\\icat.exe -o 63 "C:\\\\Users\\\\...\\\\Metasploitable.vmdk" 50211')}
<div style="background:${BG2};border:1px solid ${BD};border-left:2px solid ${R};border-radius:6px;padding:24px;display:flex;align-items:center;justify-content:center;min-height:72px;margin-bottom:12px;">
<span style="font-size:13px;color:#484f58;font-style:italic;">[ no output returned ]</span>
</div>
<div style="background:#1a1208;border:1px solid ${A};border-radius:6px;padding:14px 16px;font-size:12px;color:${A};line-height:1.8;margin-bottom:10px;">
<div style="font-weight:600;margin-bottom:6px;color:${T};">FORENSIC INTERPRETATION</div>
istat confirmed <span style="color:${R};">size: 0 bytes</span> — the orphaned inode retained structural metadata but no file content. This is expected behavior: timestamps, permissions, and ownership recorded — data blocks absent. The ghost of a file.
</div>
<div style="font-size:12px;color:${D};">Recovery outcome: <span style="color:${A};">metadata preserved</span> · content: <span style="color:${R};">unrecoverable (null)</span></div>`},

{r:()=>`${hdr('INVESTIGATION COMPLETE','Final Summary',G)}
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;">
${[['mmls','Partition structure mapped'],['fsstat','Ext3 filesystem identified'],['fls','Files & dirs enumerated'],['fls -r','Recursive traversal complete'],['istat','Orphan metadata recovered'],['icat','Recovery attempted (null result)']].map(([c,d])=>`<div style="background:${BG};border:1px solid #238636;border-radius:6px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;"><span style="color:${G};font-size:11px;min-width:52px;margin-top:1px;">${c}</span><span style="color:${S};font-size:12px;line-height:1.5;">${d}</span></div>`).join('')}
</div>
<div style="background:${BG2};border:1px solid ${BD};border-radius:6px;padding:14px 16px;font-size:12px;color:${D};line-height:1.8;margin-bottom:10px;">
Key finding: <span style="color:${T};">filesystem metadata persists beyond file deletion.</span> istat recovered timestamps, permissions, and ownership from a deallocated inode — confirming that forensic artifacts survive even when file content is unrecoverable.
</div>
<div style="font-size:11px;color:#484f58;text-align:center;" class="blink">▊ investigation complete · IT 322 · Bryan Treanton</div>`}
];

let cur=0;
function render(){
  document.getElementById('slide-content').innerHTML=slides[cur].r();
  document.getElementById('slide-label').textContent=`TSK_FORENSICS.ps1 — ${cur+1} / ${slides.length}`;
  const p=document.getElementById('prog');
  p.innerHTML=slides.map((_,i)=>`<div class="prog-bar" style="background:${i===cur?G:i<cur?'#238636':BD};"></div>`).join('');
  document.getElementById('btn-prev').style.opacity=cur===0?'0.3':'1';
  const nb=document.getElementById('btn-next');
  nb.textContent=cur===slides.length-1?'DONE ✓':'NEXT ▶';
  nb.style.background=cur===slides.length-1?'#388bfd':'#238636';
}
function navigate(d){const n=cur+d;if(n>=0&&n<slides.length){cur=n;render();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
});
render();
</script>
</body>
</html>
